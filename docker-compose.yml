version: '3'

networks:
  nhd:

services:
  app:
    container_name: nhd
    build: ./
    ports:
      - "8081:8081"
    volumes:
      - c:/docker/log:/var/log
    environment:
      - "SPRING_PROFILES_ACTIVE=prod"
      - "DB_URL=jdbc:postgresql://host.docker.internal:5432/nhahocduong?currentSchema=nhahocduong"
      - "DB_USERNAME=nhahocduong"
      - "DB_PASSWORD=nhahocduong"
    networks:
      - nhd
  prometheus:
    image: prom/prometheus
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - nhd
  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3000:3000"
    networks:
      - nhd
  loki:
    image: grafana/loki
    container_name: loki
    ports:
      - "3100:3100"
    volumes:
      - ./loki.yml:/etc/loki/loki.yml
    command: -config.file=/etc/loki/loki.yml
    networks:
      - nhd
  promtail:
    image: grafana/promtail
    container_name: promtail
    volumes:
      - c:/docker/log:/var/log/
      - ./promtail.yml:/etc/promtail/promtail.yml
    command: -config.file=/etc/promtail/promtail.yml
    networks:
      - nhd